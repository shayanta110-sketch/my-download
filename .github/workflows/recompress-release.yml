name: Release Workflow

on:
  release:
    types: [published]

jobs:
  # JOB 1: ایجاد Release (در صورت انتشار نسخه جدید)
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, '-beta') }}
          generate_release_notes: true

  # JOB 2: ساخت فایل‌های نهایی برای پلتفرم‌های مختلف
  build:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: myapp-linux
            asset_name: myapp-linux
          - os: windows-latest
            artifact_name: myapp-windows.exe
            asset_name: myapp-windows.exe
          - os: macos-latest
            artifact_name: myapp-macos
            asset_name: myapp-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v4
        with:
          version: latest
          install-only: true

      - name: Build
        run: |
          # کامند build خود را اینجا قرار دهید
          echo "Building for ${{ runner.os }}"

      - name: Compress with UPX
        run: upx --best --lzma "${{ matrix.artifact_name }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_name }}
          compression-level: 6

  # JOB 3: فشرده‌سازی نهایی و آپلود در Release
  recompress-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare Release Files
        run: |
          mkdir -p release/
          # مسیر دقیق‌تر برای کپی فایل‌ها
          for file in artifacts/*/*; do
            if [ -f "$file" ]; then
              cp "$file" release/
            fi
          done

      - name: Create Archives
        run: |
          # فشرده‌سازی با Zstandard و پشتیبانی از حداکثر نخ‌ها
          tar -cf release.tar -C release/ .
          zstd -T0 -19 -o release.tar.zst release.tar
          sha256sum release.tar.zst > release.tar.zst.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          files: |
            release.tar.zst
            release.tar.zst.sha256
