name: "V2_Download and Split Large Model from Hugging Face"

on:
  workflow_dispatch:

jobs:
  prepare_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create download directory
        run: mkdir -p ./downloaded-model

      - name: Download model directly from Hugging Face
        run: |
          # تابع دانلود با مدیریت خطا و تأخیر
          download_file() {
            local url=$1
            local output=$2
            local max_retries=3
            local retry_delay=5
            
            for i in $(seq 1 $max_retries); do
              echo "Downloading: $url (Attempt $i/$max_retries)"
              
              if wget --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                     --tries=1 --timeout=60 --waitretry=2 \
                     -O "./downloaded-model/$output" "$url"; then
                echo "✅ Successfully downloaded: $output"
                return 0
              else
                echo "⚠️ Download failed (Attempt $i/$max_retries). Waiting ${retry_delay}s..."
                sleep $retry_delay
                retry_delay=$((retry_delay * 2))
              fi
            done
            
            echo "❌ Failed to download: $url after $max_retries attempts"
            return 1
          }
          
          # دانلود فایل‌ها با تأخیر بین هر دانلود
          download_file "https://huggingface.co/mah92/Khadijah-FA_EN-Matcha-TTS-Model/resolve/main/matcha-fa_en-khadijah-22050-3.onnx" "matcha-fa_en-khadijah-22050-3.onnx"
          sleep 2
          
          download_file "https://huggingface.co/mah92/Khadijah-FA_EN-Matcha-TTS-Model/resolve/main/add_sherpa_metadata_to_matcha.py" "add_sherpa_metadata_to_matcha.py"
          sleep 2
          
          download_file "https://huggingface.co/MahtaFetrat/Mana-Persian-Piper/resolve/main/fa_IR-mana-medium.onnx" "fa_IR-mana-medium.onnx"
          sleep 2
          
          download_file "https://huggingface.co/MahtaFetrat/Mana-Persian-Piper/resolve/main/fa_IR-mana-medium.onnx.json" "fa_IR-mana-medium.onnx.json"
          sleep 2
          
          # لینک اصلاح شده برای فایل sherpa-onnx (نسخه تصحیح شده)
          download_file "https://huggingface.co/csukuangfj/sherpa-onnx-libs/resolve/main/win64/sherpa-onnx-v1.9.12-win-x64-shared.tar.bz2" "sherpa-onnx-v1.9.12-win-x64-shared.tar.bz2"
          sleep 2
          
          download_file "https://huggingface.co/PaddlePaddle/PaddleOCR-VL-1.5-GGUF/resolve/main/PaddleOCR-VL-1.5.gguf" "PaddleOCR-VL-1.5.gguf"
          sleep 2
          
          download_file "https://huggingface.co/nold/starcoder2-3b-GGUF/resolve/1ae8f93b9169bb114e9968777ba16f77809c5169/starcoder2-3b_Q8_0.gguf" "starcoder2-3b_Q8_0.gguf"
          sleep 2
          
          download_file "https://huggingface.co/allenai/OLMo-2-0425-1B-GGUF/resolve/main/OLMo-2-0425-1B-Q6_K.gguf" "OLMo-2-0425-1B-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/afrideva/bling-sheared-llama-1.3b-0.1-GGUF/resolve/main/bling-sheared-llama-1.3b-0.1.q6_k.gguf" "bling-sheared-llama-1.3b-0.1.q6_k.gguf"
          sleep 2
          
          download_file "https://huggingface.co/bartowski/Menlo_Lucy-GGUF/resolve/main/Menlo_Lucy-Q6_K_L.gguf" "Menlo_Lucy-Q6_K_L.gguf"
          sleep 2
          
          download_file "https://huggingface.co/LiquidAI/LFM2-1.2B-GGUF/resolve/main/LFM2-1.2B-Q6_K.gguf" "LFM2-1.2B-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/llmware/slim-summary-tiny-tool/resolve/a912c1e94791835898b12ebb05af51f7e5a2ea0b/tiny-summary.gguf" "tiny-summary.gguf"
          sleep 2
          
          # لینک‌های پیشنهادی جدید: استفاده از فایل‌های Q6_K به جای Q6_K_L برای اطمینان از وجود فایل
          download_file "https://huggingface.co/bartowski/LiquidAI_LFM2-1.2B-Tool-GGUF/resolve/main/LiquidAI_LFM2-1.2B-Tool-Q6_K.gguf" "LiquidAI_LFM2-1.2B-Tool-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/bartowski/LiquidAI_LFM2-1.2B-Extract-GGUF/resolve/main/LiquidAI_LFM2-1.2B-Extract-Q6_K.gguf" "LiquidAI_LFM2-1.2B-Extract-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/bartowski/LiquidAI_LFM2-350M-Math-GGUF/resolve/main/LiquidAI_LFM2-350M-Math-Q6_K.gguf" "LiquidAI_LFM2-350M-Math-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/bartowski/stable-code-instruct-3b-GGUF/resolve/main/stable-code-instruct-3b-Q6_K.gguf" "stable-code-instruct-3b-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/afrideva/tinyllama-python-GGUF/resolve/main/tinyllama-python.q6_k.gguf" "tinyllama-python.q6_k.gguf"

      - name: Calculate total size
        id: check-size
        run: |
          total_bytes=$(du -sb ./downloaded-model | cut -f1)
          total_mb=$((total_bytes / 1024 / 1024))
          echo "Total size: ${total_mb} MB"
          if [ $total_bytes -gt 900000000 ]; then
            echo "single_file=false" >> $GITHUB_OUTPUT
          else
            echo "single_file=true" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP archive with 500MB split parts
        if: steps.check-size.outputs.single_file == 'false'
        run: |
          zip -s 500m -r model.zip ./downloaded-model/
          echo "Files created by zip -s:"
          ls -lh model.z* model.zip 2>/dev/null || echo "No split files found"
          part_num=1
          for file in $(ls -v model.z* 2>/dev/null); do
            printf -v new_name "part%02d.zip" "$part_num"
            mv "$file" "$new_name"
            echo "Created: $new_name"
            ((part_num++))
          done
          if [ -f model.zip ]; then
            printf -v new_name "part%02d.zip" "$part_num"
            mv model.zip "$new_name"
            echo "Created: $new_name"
          fi

      - name: Create single ZIP file (when size <= 900MB)
        if: steps.check-size.outputs.single_file == 'true'
        run: |
          zip -r model.zip ./downloaded-model/
          mv model.zip part01.zip
          echo "Created: part01.zip"

      - name: Verify files exist
        run: |
          echo "List of files to upload:"
          ls -la part*.zip || echo "No part*.zip files found"

      - name: Create Git tag
        id: tag
        run: |
          TAG_NAME="model-download-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Model Download ${{ github.run_number }}"
          body: |
            ## 📦 فایل‌های مدل دانلود شده
            $(for f in part*.zip; do echo "- $f"; done)
            
            برای استخراج فایل اصلی:
            1. همه فایل‌های part*.zip را دانلود کنید.
            2. در لینوکس/مک: `cat part*.zip > combined.zip && unzip combined.zip`
            3. در ویندوز: همه فایل‌ها را در یک پوشه قرار دهید، سپس با 7-Zip یا WinRAR فایل part01.zip را باز کنید.
          files: part*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
