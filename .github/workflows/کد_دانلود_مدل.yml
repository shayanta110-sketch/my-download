name: "V2_Download and Split Large Model from Hugging Face"

on:
  workflow_dispatch:

jobs:
  prepare_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create download directory
        run: mkdir -p ./downloaded-model

      - name: Download model directly from Hugging Face
        run: |
          wget https://huggingface.co/mah92/Khadijah-FA_EN-Matcha-TTS-Model/resolve/main/matcha-fa_en-khadijah-22050-3.onnx -O ./downloaded-model/matcha-fa_en-khadijah-22050-3.onnx
          wget https://huggingface.co/mah92/Khadijah-FA_EN-Matcha-TTS-Model/resolve/main/add_sherpa_metadata_to_matcha.py -O ./downloaded-model/add_sherpa_metadata_to_matcha.py
          wget https://huggingface.co/MahtaFetrat/Mana-Persian-Piper/resolve/main/fa_IR-mana-medium.onnx -O ./downloaded-model/fa_IR-mana-medium.onnx
          wget https://huggingface.co/MahtaFetrat/Mana-Persian-Piper/resolve/main/fa_IR-mana-medium.onnx.json -O ./downloaded-model/fa_IR-mana-medium.onnx.json
          wget https://huggingface.co/csukuangfj/sherpa-onnx-libs/resolve/main/win64/sherpa-onnx-v1.12.39-win-x64-shared-MD-Release.tar.bz2 -O ./downloaded-model/sherpa-onnx-v1.12.39-win-x64-shared-MD-Release.tar.bz2
          wget https://huggingface.co/PaddlePaddle/PaddleOCR-VL-1.5-GGUF/resolve/main/PaddleOCR-VL-1.5-GGUF.gguf -O ./downloaded-model/PaddleOCR-VL-1.5-GGUF.gguf
          wget https://huggingface.co/nold/starcoder2-3b-GGUF/resolve/1ae8f93b9169bb114e9968777ba16f77809c5169/starcoder2-3b_Q8_0.gguf -O ./downloaded-model/starcoder2-3b_Q8_0.gguf
          wget https://huggingface.co/allenai/OLMo-2-0425-1B-GGUF/resolve/main/OLMo-2-0425-1B-Q6_K.gguf -O ./downloaded-model/OLMo-2-0425-1B-Q6_K.gguf
          wget https://huggingface.co/afrideva/bling-sheared-llama-1.3b-0.1-GGUF/resolve/main/bling-sheared-llama-1.3b-0.1.q6_k.gguf -O ./downloaded-model/bling-sheared-llama-1.3b-0.1.q6_k.gguf
          wget https://huggingface.co/bartowski/Menlo_Lucy-GGUF/resolve/main/Menlo_Lucy-Q6_K_L.gguf -O ./downloaded-model/Menlo_Lucy-Q6_K_L.gguf
          wget https://huggingface.co/LiquidAI/LFM2-1.2B-GGUF/resolve/main/LFM2-1.2B-Q6_K.gguf -O ./downloaded-model/LFM2-1.2B-Q6_K.gguf
          wget https://huggingface.co/llmware/slim-summary-tiny-tool/resolve/a912c1e94791835898b12ebb05af51f7e5a2ea0b/tiny-summary.gguf -O ./downloaded-model/tiny-summary.gguf
          wget https://huggingface.co/bartowski/LiquidAI_LFM2-1.2B-Tool-GGUF/resolve/main/LiquidAI_LFM2-1.2B-Tool-Q6_K_L.gguf -O ./downloaded-model/LiquidAI_LFM2-1.2B-Tool-Q6_K_L.gguf
          wget https://huggingface.co/bartowski/LiquidAI_LFM2-1.2B-Extract-GGUF/resolve/main/LiquidAI_LFM2-1.2B-Extract-Q6_K_L.gguf -O ./downloaded-model/LiquidAI_LFM2-1.2B-Extract-Q6_K_L.gguf
          wget https://huggingface.co/bartowski/LiquidAI_LFM2-350M-Math-GGUF/resolve/main/LiquidAI_LFM2-350M-Math-Q6_K_L.gguf -O ./downloaded-model/LiquidAI_LFM2-350M-Math-Q6_K_L.gguf
          wget https://huggingface.co/bartowski/stable-code-instruct-3b-GGUF/resolve/main/stable-code-instruct-3b-Q6_K.gguf -O ./downloaded-model/stable-code-instruct-3b-Q6_K.gguf
          wget https://huggingface.co/afrideva/tinyllama-python-GGUF/resolve/main/tinyllama-python.q6_k.gguf -O ./downloaded-model/tinyllama-python.q6_k.gguf

      - name: Calculate total size
        id: check-size
        run: |
          total_bytes=$(du -sb ./downloaded-model | cut -f1)
          total_mb=$((total_bytes / 1024 / 1024))
          echo "Total size: ${total_mb} MB"
          if [ $total_bytes -gt 900000000 ]; then
            echo "single_file=false" >> $GITHUB_OUTPUT
          else
            echo "single_file=true" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP archive with 500MB split parts
        if: steps.check-size.outputs.single_file == 'false'
        run: |
          zip -s 500m -r model.zip ./downloaded-model/
          echo "Files created by zip -s:"
          ls -lh model.z* model.zip 2>/dev/null || echo "No split files found"
          part_num=1
          for file in $(ls -v model.z* 2>/dev/null); do
            printf -v new_name "part%02d.zip" "$part_num"
            mv "$file" "$new_name"
            echo "Created: $new_name"
            ((part_num++))
          done
          if [ -f model.zip ]; then
            printf -v new_name "part%02d.zip" "$part_num"
            mv model.zip "$new_name"
            echo "Created: $new_name"
          fi

      - name: Create single ZIP file (when size <= 900MB)
        if: steps.check-size.outputs.single_file == 'true'
        run: |
          zip -r model.zip ./downloaded-model/
          mv model.zip part01.zip
          echo "Created: part01.zip"

      - name: Verify files exist
        run: |
          echo "List of files to upload:"
          ls -la part*.zip || echo "No part*.zip files found"

      - name: Create Git tag
        id: tag
        run: |
          # مقدار یکتا برای tag (شامل زمان)
          TAG_NAME="model-download-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # ساخت tag
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          
          # پوش tag به ریموت
          git push origin "$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Model Download ${{ github.run_number }}"
          body: |
            ## 📦 فایل‌های مدل دانلود شده
            $(for f in part*.zip; do echo "- $f"; done)
            
            برای استخراج فایل اصلی:
            1. همه فایل‌های part*.zip را دانلود کنید.
            2. در لینوکس/مک: `cat part*.zip > combined.zip && unzip combined.zip`
            3. در ویندوز: همه فایل‌ها را در یک پوشه قرار دهید، سپس با 7-Zip یا WinRAR فایل part01.zip را باز کنید.
          files: part*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
