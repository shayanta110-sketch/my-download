name: "دانلود APK‌های TTS و انتشار در GitHub Release"

on:
  workflow_dispatch:   # اجرای دستی از طریق دکمه "Run workflow"

jobs:
  prepare_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create download directory
        run: mkdir -p ./downloaded-apks

      - name: Download all APK files from hf-mirror
        run: |
          # لیست لینک‌های دانلود مستقیم (resolve + download=true)
          URLs=(
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.40/sherpa-onnx-1.12.40-arm64-v8a-fa-tts-engine-matcha-tts-fa_en-khadijah.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.40/sherpa-onnx-1.12.40-arm64-v8a-fa-tts-engine-vits-piper-fa_IR-reza_ibrahim-medium.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.40/sherpa-onnx-1.12.40-arm64-v8a-fa-tts-engine-vits-piper-fa_IR-ganji-medium.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.40/sherpa-onnx-1.12.40-arm64-v8a-fa-tts-engine-vits-piper-fa_IR-ganji_adabi-medium.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.36/sherpa-onnx-1.12.36-arm64-v8a-fa-tts-engine-matcha-tts-fa_en-khadijah.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.36/sherpa-onnx-1.12.36-arm64-v8a-fa-tts-engine-matcha-tts-fa_en-musa.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.36/sherpa-onnx-1.12.36-arm64-v8a-fa-tts-engine-vits-piper-fa_IR-reza_ibrahim-medium.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.36/sherpa-onnx-1.12.36-arm64-v8a-fa-tts-engine-vits-piper-fa_IR-gyro-medium.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.36/sherpa-onnx-1.12.36-arm64-v8a-fa-tts-engine-vits-piper-fa_IR-amir-medium.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.36/sherpa-onnx-1.12.36-arm64-v8a-fa-tts-engine-vits-piper-fa_IR-ganji_adabi-medium.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.36/sherpa-onnx-1.12.36-arm64-v8a-fa-tts-engine-vits-piper-fa_en-rezahedayatfar-ibrahimwalk-medium.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.33/sherpa-onnx-1.12.33-arm64-v8a-fa-tts-engine-matcha-tts-fa_en-khadijah.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.33/sherpa-onnx-1.12.33-arm64-v8a-fa-tts-engine-matcha-tts-fa_en-musa.apk?download=true"
            "https://hf-mirror.com/csukuangfj2/sherpa-onnx-apk/resolve/main/tts-engine-new/1.12.33/sherpa-onnx-1.12.33-arm64-v8a-fa-tts-engine-vits-piper-fa_en-rezahedayatfar-ibrahimwalk-medium.apk?download=true"
          )

          for url in "${URLs[@]}"; do
            # استخراج نام فایل از آدرس (بعد از آخرین / و قبل از ?)
            filename=$(basename "$url" | cut -d'?' -f1)
            echo "Downloading $filename ..."
            wget -q --show-progress "$url" -O "./downloaded-apks/$filename"
          done

      - name: Calculate total size
        id: check-size
        run: |
          total_bytes=$(du -sb ./downloaded-apks | cut -f1)
          total_mb=$((total_bytes / 1024 / 1024))
          echo "Total size: ${total_mb} MB"
          if [ $total_bytes -gt 900000000 ]; then
            echo "single_file=false" >> $GITHUB_OUTPUT
          else
            echo "single_file=true" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP archive with 500MB split parts
        if: steps.check-size.outputs.single_file == 'false'
        run: |
          zip -s 500m -r model.zip ./downloaded-apks/
          echo "Files created by zip -s:"
          ls -lh model.z* model.zip 2>/dev/null || echo "No split files found"
          part_num=1
          for file in $(ls -v model.z* 2>/dev/null); do
            printf -v new_name "part%02d.zip" "$part_num"
            mv "$file" "$new_name"
            echo "Created: $new_name"
            ((part_num++))
          done
          if [ -f model.zip ]; then
            printf -v new_name "part%02d.zip" "$part_num"
            mv model.zip "$new_name"
            echo "Created: $new_name"
          fi

      - name: Create single ZIP file (when size <= 900MB)
        if: steps.check-size.outputs.single_file == 'true'
        run: |
          zip -r model.zip ./downloaded-apks/
          mv model.zip part01.zip
          echo "Created: part01.zip"

      - name: Verify files exist
        run: |
          echo "List of files to upload:"
          ls -la part*.zip || echo "No part*.zip files found"

      - name: Create Git tag
        id: tag
        run: |
          TAG_NAME="apks-download-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "دانلود APK‌های موتور TTS فارسی - شماره ${{ github.run_number }}"
          body: |
            ## 📦 فایل‌های APK دانلود شده از hf-mirror
            
            $(for f in part*.zip; do echo "- $f"; done)
            
            ### نحوه استخراج:
            - در **لینوکس/مک**: 
              ```bash
              cat part*.zip > combined.zip && unzip combined.zip
