name: دانلود و پارتیشن‌بندی چند مدل (نسخه JSON)

on:
  workflow_dispatch:
    inputs:
      models_json:
        description: 'آرایه JSON از لینک‌های مدل‌ها (مثال: ["url1", "url2", ...])'
        required: true
        default: '[]'
      pr_numbers:
        description: 'شماره PRها (اختیاری)'
        required: false
        type: string
        default: ''
      split_size_mb:
        description: 'حداکثر حجم هر پارتیشن (مگابایت)'
        required: false
        default: '500'
      version_tag:
        description: 'نسخه Tags‌ها (اختیاری)'
        required: false
        type: string
        default: 'latest'

jobs:
  validate-prs:
    runs-on: ubuntu-latest
    outputs:
      resolved_pr_numbers: ${{ steps.validate.outputs.resolved_pr_numbers }}
    steps:
      - name: Validate PR Numbers
        id: validate
        run: |
          RESOLVED_PR=""
          if [ -n "${{ github.event.inputs.pr_numbers }}" ]; then
            IFS=',' read -ra PR_ARR <<< "${{ github.event.inputs.pr_numbers }}"
            echo "PRs to consider: ${PR_ARR[@]}"
          else
            echo "No PRs provided."
          fi
          echo "resolved_pr_numbers=${RESOLVED_PR}" >> $GITHUB_OUTPUT

      - name: Build tag matrix
        id: build-tag-matrix
        run: |
          # ... (کد ساخت ماتریکس تگ‌ها)

  process-models:
    needs: [validate-prs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        model_url: ${{ fromJSON(github.event.inputs.models_json) }}
      fail-fast: false
    steps:
      - name: بررسی مخزن
        uses: actions/checkout@v4

      - name: نصب ابزارهای مورد نیاز
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: تشخیص نام فایل از لینک
        id: extract_name
        run: |
          URL="${{ matrix.model_url }}"
          CLEAN_URL="${URL%%\?*}"
          FULL_FILE_NAME=$(basename "$CLEAN_URL")
          echo "FULL_FILE_NAME=$FULL_FILE_NAME" >> $GITHUB_ENV

      - name: دانلود مدل
        run: |
          wget --progress=bar:force "${{ matrix.model_url }}" -O "${{ env.FULL_FILE_NAME }}"

      - name: ذخیره SHA256 فایل اصلی (قبل از پارتیشن‌بندی)
        id: hash_original
        run: |
          ORIGINAL_HASH=$(sha256sum "${{ env.FULL_FILE_NAME }}" | cut -d' ' -f1)
          echo "ORIGINAL_HASH=$ORIGINAL_HASH" >> $GITHUB_ENV

      - name: پارتیشن‌بندی مستقیم فایل
        run: |
          SIZE_MB="${{ github.event.inputs.split_size_mb }}"
          split -b "${SIZE_MB}M" --numeric-suffixes=1 -a 2 "${{ env.FULL_FILE_NAME }}" "part_"
          for file in part_*; do
            part_number=${file#part_}
            mv "$file" "part_${part_number}.zip"
          done
          rm -f "${{ env.FULL_FILE_NAME }}"
          echo "✅ پارتیشن‌بندی انجام شد."

      - name: ایجاد فایل checksums.txt استاندارد
        run: |
          echo "# Checksums for ${{ env.FULL_FILE_NAME }}" > checksums.txt
          echo "" >> checksums.txt
          echo "${{ env.ORIGINAL_HASH }}  ${{ env.FULL_FILE_NAME }}" >> checksums.txt
          sha256sum part_*.zip >> checksums.txt

      - name: اعتبارسنجی سریع قطعات
        run: |
          cat part_*.zip > temp_combined.file
          ACTUAL_HASH=$(sha256sum temp_combined.file | cut -d' ' -f1)
          if [ "$ACTUAL_HASH" = "${{ env.ORIGINAL_HASH }}" ]; then
            echo "✅ اعتبارسنجی موفق"
          else
            echo "❌ خطا: هش قطعات با فایل اصلی مطابقت ندارد!"
            exit 1
          fi
          rm temp_combined.file

      - name: آماده‌سازی متن رلیز
        run: |
          cat > release_notes.md << 'EOF'
          ## 📦 دانلود مدل [MODEL_NAME]
          🚀 مدل با موفقیت دانلود و پارتیشن‌بندی شد.
          **فایل اصلی:** `[MODEL_NAME]`
          **هش SHA256 فایل اصلی:**
