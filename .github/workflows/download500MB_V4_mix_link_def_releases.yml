name: "دانلود و پارتیشن‌بندی چند مدل (نسخه نهایی - پایدار حافظه)"

on:
  workflow_dispatch:
    inputs:
      models_json:
        description: 'آرایه JSON از لینک‌های مدل‌ها (مثال: ["url1", "url2"])'
        required: true
        default: '[]'
      split_size_mb:
        description: 'حداکثر حجم هر پارتیشن (مگابایت)'
        required: false
        default: '500'

jobs:
  process-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        model_url: ${{ fromJSON(github.event.inputs.models_json) }}
      fail-fast: false
    steps:
      - name: بررسی مخزن
        uses: actions/checkout@v4

      - name: نصب ابزارهای مورد نیاز (بی‌صدا)
        run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y p7zip-full > /dev/null 2>&1

      - name: تشخیص نام فایل از لینک
        id: extract_name
        run: |
          URL="${{ matrix.model_url }}"
          CLEAN_URL="${URL%%\?*}"
          FULL_FILE_NAME=$(basename "$CLEAN_URL")
          echo "FULL_FILE_NAME=$FULL_FILE_NAME" >> $GITHUB_ENV
          echo "::notice::در حال پردازش $FULL_FILE_NAME"

      - name: دانلود مدل (بی‌صدا)
        run: |
          wget --quiet --show-progress "${{ matrix.model_url }}" -O "${{ env.FULL_FILE_NAME }}"

      - name: ذخیره SHA256 فایل اصلی
        id: hash_original
        run: |
          ORIGINAL_HASH=$(sha256sum "${{ env.FULL_FILE_NAME }}" | cut -d' ' -f1)
          echo "ORIGINAL_HASH=$ORIGINAL_HASH" >> $GITHUB_ENV

      - name: پارتیشن‌بندی مستقیم فایل (بی‌صدا)
        run: |
          SIZE_MB="${{ github.event.inputs.split_size_mb }}"
          split -b "${SIZE_MB}M" --numeric-suffixes=1 -a 2 "${{ env.FULL_FILE_NAME }}" "part_"
          for file in part_*; do
            part_number=${file#part_}
            mv "$file" "part_${part_number}.zip"
          done
          rm -f "${{ env.FULL_FILE_NAME }}"
          echo "✅ پارتیشن‌بندی انجام شد."

      - name: ایجاد فایل checksums.txt
        run: |
          {
            echo "# Checksums for ${{ env.FULL_FILE_NAME }}"
            echo ""
            echo "${{ env.ORIGINAL_HASH }}  ${{ env.FULL_FILE_NAME }}"
            sha256sum part_*.zip
          } > checksums.txt

      - name: آماده‌سازی متن رلیز
        run: |
          cat > release_notes.md << EOF
          ## 📦 دانلود مدل: ${{ env.FULL_FILE_NAME }}
          
          🚀 مدل با موفقیت دانلود و پارتیشن‌بندی شد.
          
          **فایل اصلی:** \`${{ env.FULL_FILE_NAME }}\`
          
          **هش SHA256 فایل اصلی:**
          \`\`\`
          ${{ env.ORIGINAL_HASH }}
          \`\`\`
          
          ### نحوه بازسازی فایل اصلی:
          1. تمام فایل‌های \`part_*.zip\` را در یک پوشه دانلود کنید.
          2. در ترمینال (لینوکس، macOS یا WSL ویندوز) دستور زیر را اجرا کنید:
             \`\`\`bash
             cat part_*.zip > ${{ env.FULL_FILE_NAME }}
             \`\`\`
          3. فایل اصلی \`${{ env.FULL_FILE_NAME }}\` بازسازی می‌شود.
          
          ### بررسی صحت:
          - فایل \`checksums.txt\` شامل هش فایل اصلی و هش تک‌تک قطعات است.
          - برای بررسی خودکار: \`sha256sum -c checksums.txt\`
          EOF

      - name: ایجاد Release و آپلود با GitHub CLI
        id: release
        run: |
          SAFE_NAME=$(echo "${{ env.FULL_FILE_NAME }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          TAG_NAME="model-${SAFE_NAME}-${{ github.run_id }}-${{ strategy.job-index }}"
          gh release create "$TAG_NAME" \
            --title "📦 دانلود مدل: ${{ env.FULL_FILE_NAME }}" \
            --notes-file release_notes.md \
            part_*.zip checksums.txt \
            --repo "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: پاکسازی فایل‌های موقتی برای آزادسازی فضا
        run: |
          echo "Disk usage before cleanup:"
          df -h /
          echo "🧹 Cleaning up..."
          rm -rf part_*.zip checksums.txt release_notes.md
          echo "Disk usage after cleanup:"
          df -h /

      - name: اعلان موفقیت نهایی
        run: echo "::notice::✅ مدل ${{ env.FULL_FILE_NAME }} با موفقیت در Release ${{ env.TAG_NAME }} منتشر شد."
