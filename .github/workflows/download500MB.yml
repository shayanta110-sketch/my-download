name: "Download and Split Large Model from Hugging Face"

on:
  workflow_dispatch:

jobs:
  prepare_parts:
    runs-on: ubuntu-latest
    outputs:
      part_list: ${{ steps.set-parts.outputs.part_list }}
      single_file: ${{ steps.check-size.outputs.single_file }}
    steps:
      - name: Create download directory
        run: mkdir -p ./downloaded-model

      - name: Download model directly from Hugging Face
        run: |
          wget https://huggingface.co/WeightedAI/Persian_OCR/resolve/main/pytorch_model.bin -O ./downloaded-model/pytorch_model.bin
          # اگر فایل‌های دیگری هم دارید، آن‌ها را هم اینجا اضافه کنید

      - name: Calculate total size
        id: check-size
        run: |
          total_bytes=$(du -sb ./downloaded-model | cut -f1)
          total_mb=$((total_bytes / 1024 / 1024))
          echo "Total size: ${total_mb} MB"
          if [ $total_bytes -gt 900000000 ]; then
            echo "single_file=false" >> $GITHUB_OUTPUT
          else
            echo "single_file=true" >> $GITHUB_OUTPUT
          fi

      - name: Install RAR tool
        if: steps.check-size.outputs.single_file == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y rar

      - name: Create RAR volumes (500MB each) with numbering from 01
        if: steps.check-size.outputs.single_file == 'false'
        run: |
          # فشرده‌سازی کل پوشه به صورت RAR با حجم 500 مگابایت
          rar a -v500m -ep1 -m5 model.rar ./downloaded-model/

          # تغییر نام فایل‌ها به part01.rar, part02.rar, ...
          for file in model.part*.rar; do
            number=$(echo "$file" | grep -oP '(?<=model\.part)\d+')
            printf -v new_name "part%02d.rar" "$number"
            mv "$file" "$new_name"
            echo "Created: $new_name"
          done
          if [ -f model.rar ]; then
            mv model.rar part01.rar
          fi
          ls -lh part*.rar

      - name: Create single RAR file (when size <= 900MB)
        if: steps.check-size.outputs.single_file == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y rar
          rar a -ep1 -m5 model.rar ./downloaded-model/
          mv model.rar part01.rar

      - name: Generate part list for matrix upload
        id: set-parts
        run: |
          parts=()
          for file in part*.rar; do
            if [ -f "$file" ]; then
              parts+=("$file")
            fi
          done
          echo "part_list=$(printf '%s\n' "${parts[@]}" | jq -R . | jq -cs .)" >> $GITHUB_OUTPUT

  upload_parts:
    needs: prepare_parts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        part: ${{ fromJson(needs.prepare_parts.outputs.part_list) }}
    steps:
      - name: Download parts from previous job
        uses: actions/download-artifact@v4
        with:
          name: rar-parts
          path: ./all-parts

      - name: Upload single part
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.part }}
          path: ./all-parts/${{ matrix.part }}
