name: "V2_Download and Split Large Model from Hugging Face"
on:
  workflow_dispatch:

jobs:
  prepare_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: نصب 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Create download directory
        run: mkdir -p ./downloaded-model

      - name: Download model from Hugging Face
        run: |
          wget https://huggingface.co/mradermacher/Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored-i1-GGUF/resolve/main/Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored.i1-Q4_K_M.gguf -O ./downloaded-model/model.gguf

      - name: Create a single uncompressed ZIP (store mode, fast)
        run: |
          cd downloaded-model
          zip -0 -r ../original.zip .
          cd ..

      - name: Split into 500MB parts using 7z (Standard Method)
        id: split
        run: |
          # ایجاد پارتیشن‌های 500 مگابایتی با 7z (خروجی اصلی: original.zip.001, original.zip.002, ...)
          7z -v500m a model-part.7z original.zip
          
          # حذف فایل اصلی برای صرفه‌جویی در فضا
          rm original.zip
          
          # تغییر نام فایل‌ها به فرمت partXX.zip برای راحتی کاربران
          part_num=1
          for file in $(ls -v model-part.7z.* 2>/dev/null); do
            printf -v new_name "part%02d.zip" "$part_num"
            mv "$file" "$new_name"
            echo "✅ ایجاد شد: $new_name"
            ((part_num++))
          done
          
          # ذخیره تعداد پارتیشن‌ها برای مرحله اعتبارسنجی
          echo "PART_COUNT=$((part_num-1))" >> $GITHUB_ENV

      - name: ✅ اعتبارسنجی نهایی پارتیشن‌ها با 7z
        run: |
          echo "🔄 در حال اعتبارسنجی ${{ env.PART_COUNT }} پارتیشن..."
          
          # تست مستقیم یکپارچگی با دستور 7z روی اولین فایل part01.zip
          # 7z به طور خودکار فایل‌های part02.zip، part03.zip و ... را در صورت نیاز فراخوانی می‌کند
          if 7z t part01.zip > /dev/null 2>&1; then
            echo "✅ اعتبارسنجی موفق: همه پارتیشن‌ها سالم هستند و به درستی ترکیب می‌شوند."
          else
            echo "❌ اعتبارسنجی ناموفق: پارتیشن‌ها خراب هستند یا ترتیب آن‌ها صحیح نیست."
            exit 1
          fi

      - name: List files to upload
        run: ls -lh part*.zip

      - name: Create Git tag
        id: tag
        run: |
          TAG_NAME="model-download-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload parts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Model Download ${{ github.run_number }}(Verified and Reliable)"
          body: |
            ## 📦 پارتیشن‌های مدل (تضمین شده با 7z)
            
            این فایل‌ها با ابزار 7-Zip ساخته شده‌اند و سالم بودن آن‌ها قبل از انتشار تأیید شده است.
            
            **روش استخراج فایل اصلی:**
            
            *   **لینوکس/مک (ترمینال):** دستور `7z x part01.zip` را در پوشه‌ای که همه `part*.zip` در آن قرار دارند، اجرا کنید.
            *   **ویندوز (نرم‌افزار 7-Zip):** روی فایل `part01.zip` کلیک راست کرده و گزینه "Extract Here" را انتخاب کنید. نرم‌افزار به صورت خودکار به بقیه پارتیشن‌ها مراجعه می‌کند و فایل اصلی `model.gguf` را استخراج می‌نماید.
          files: part*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
