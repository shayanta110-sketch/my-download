name: "V2_Download and Split Large Model from Hugging Face"
on:
  workflow_dispatch:

jobs:
  prepare_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: نصب 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Create download directory
        run: mkdir -p ./downloaded-model

      - name: Download model from Hugging Face
        id: download
        run: |
          URL="https://huggingface.co/mradermacher/Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored-i1-GGUF/resolve/main/Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored.i1-Q4_K_M.gguf"
          # دریافت نام فایل از انتهای URL
          FILE_NAME=$(basename "$URL")
          echo "⬇️ Downloading: $FILE_NAME"
          wget "$URL" -O "./downloaded-model/$FILE_NAME"
          # ذخیره نام اصلی برای استفاده در کل workflow
          echo "FULL_FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "BASE_NAME=${FILE_NAME%.gguf}" >> $GITHUB_ENV

      - name: Create a single uncompressed ZIP (store mode, fast)
        run: |
          cd downloaded-model
          zip -0 -r ../original.zip .
          cd ..

      - name: Split into 500MB parts using 7z
        id: split
        run: |
          7z -v500m a model-part.7z original.zip
          rm original.zip
          EXT_COUNT=$(ls -1 model-part.7z.0* 2>/dev/null | wc -l)
          echo "PART_COUNT=$EXT_COUNT" >> $GITHUB_ENV

      - name: ✅ Integrity check BEFORE renaming (7z test)
        run: |
          echo "🔍 Checking integrity of all parts..."
          if 7z t model-part.7z.001 > /dev/null 2>&1; then
            echo "✅ Integrity check passed: All parts are valid."
          else
            echo "❌ Integrity check failed. Aborting."
            exit 1
          fi

      - name: Rename parts in format: model.gguf_01.zip
        run: |
          counter=1
          for file in $(ls -v model-part.7z.0* 2>/dev/null); do
            printf -v new_name "${FULL_FILE_NAME}_%02d.zip" "$counter"
            mv "$file" "$new_name"
            echo "✅ Renamed: $file -> $new_name"
            ((counter++))
          done

      - name: List files to upload
        run: ls -lh ${FULL_FILE_NAME}_*.zip

      - name: Create Git tag
        id: tag
        run: |
          TAG_NAME="model-download-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload parts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Model Download ${{ github.run_number }}"
          body: |
            ## 📦 مدل شما با موفقیت دانلود و پارتیشن‌بندی شد.
            
            فایل اصلی: **${{ env.FULL_FILE_NAME }}**
            
            **راهنمای استخراج:**
            1. تمام فایل‌های `${{ env.FULL_FILE_NAME }}_*.zip` را در یک پوشه دانلود کنید.
            2. روی فایل `${{ env.FULL_FILE_NAME }}_01.zip` کلیک راست کرده و `Extract Here` را انتخاب کنید.
            3. فایل اصلی `${{ env.FULL_FILE_NAME }}` در همان پوشه ظاهر می‌شود.
          files: ${{ env.FULL_FILE_NAME }}_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
