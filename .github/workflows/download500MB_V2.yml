name: "V2_Download and Split Large Model from Hugging Face"
on:
  workflow_dispatch:

jobs:
  prepare_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: نصب 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Create download directory
        run: mkdir -p ./downloaded-model

      - name: Download model from Hugging Face
        id: download
        run: |
          # دانلود فایل با نام اصلی (در اینجا model.gguf، اما هر نامی می‌تواند باشد)
          wget https://huggingface.co/mradermacher/Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored-i1-GGUF/resolve/main/Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored.i1-Q4_K_M.gguf -O ./downloaded-model/Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored.i1-Q4_K_M.gguf
          
          # استخراج نام پایه فایل (بدون مسیر، با حفظ پسوند gguf)
          BASE_NAME_WITH_EXT=$(basename "./downloaded-model/model.gguf")
          # حذف پسوند .gguf برای استفاده در نام‌گذاری (اختیاری)
          BASE_NAME_NO_EXT="${BASE_NAME_WITH_EXT%.gguf}"
          echo "BASE_NAME_WITH_EXT=$BASE_NAME_WITH_EXT" >> $GITHUB_ENV
          echo "BASE_NAME_NO_EXT=$BASE_NAME_NO_EXT" >> $GITHUB_ENV
          echo "نام فایل اصلی: $BASE_NAME_WITH_EXT"
          echo "نام پایه (بدون پسوند): $BASE_NAME_NO_EXT"

      - name: Create a single uncompressed ZIP (store mode, fast)
        run: |
          cd downloaded-model
          zip -0 -r ../original.zip .
          cd ..

      - name: Split into 500MB parts using 7z
        run: |
          7z -v500m a model-part.7z original.zip
          rm original.zip
          PART_COUNT=$(ls -1 model-part.7z.0* 2>/dev/null | wc -l)
          echo "PART_COUNT=$PART_COUNT" >> $GITHUB_ENV

      - name: Check integrity before renaming
        run: |
          echo "🔄 در حال اعتبارسنجی مجموعه پارتیشن‌ها..."
          if 7z t model-part.7z.001 > /dev/null 2>&1; then
            echo "✅ اعتبارسنجی موفق"
          else
            echo "❌ اعتبارسنجی ناموفق"
            exit 1
          fi

      - name: Rename parts using base name (format: model.gguf_01.zip)
        run: |
          # استفاده از نام پایه با پسوند (مثلاً model.gguf)
          BASE_FULL="${{ env.BASE_NAME_WITH_EXT }}"
          part_num=1
          for file in $(ls -v model-part.7z.0* 2>/dev/null); do
            # ساخت نام جدید: model.gguf_01.zip ، model.gguf_02.zip ، ...
            printf -v new_name "${BASE_FULL}_%02d.zip" "$part_num"
            mv "$file" "$new_name"
            echo "✅ تغییر نام: $file -> $new_name"
            ((part_num++))
          done

      - name: List files to upload
        run: ls -lh ${BASE_NAME_WITH_EXT}_*.zip

      - name: Create Git tag
        id: tag
        run: |
          TAG_NAME="model-download-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload parts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Model Download ${{ github.run_number }} (Verified)"
          body: |
            ## 📦 پارتیشن‌های مدل (تأیید شده با 7-Zip)
            
            فایل اصلی: `${{ env.BASE_NAME_WITH_EXT }}`
            
            **روش استخراج:**
            - همه فایل‌های `${{ env.BASE_NAME_WITH_EXT }}_*.zip` را دانلود کنید.
            - در ویندوز: روی فایل `${{ env.BASE_NAME_WITH_EXT }}_01.zip` کلیک راست → 7-Zip → Extract Here.
            - در لینوکس/مک: دستور `7z x ${{ env.BASE_NAME_WITH_EXT }}_01.zip` را اجرا کنید.
            
            پس از استخراج، فایل `${{ env.BASE_NAME_WITH_EXT }}` (مدل اصلی) در پوشه ظاهر می‌شود.
          files: ${{ env.BASE_NAME_WITH_EXT }}_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
