name: "دانلود و پارتیشن‌بندی تضمینی مدل"
on:
  workflow_dispatch:

jobs:
  prepare_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: نصب ابزار ضروری
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: دانلود مدل (نام فایل از URL استخراج می‌شود)
        id: download
        run: |
          URL="https://huggingface.co/mradermacher/Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored-i1-GGUF/resolve/main/Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored.i1-Q4_K_M.gguf"
          FULL_FILE_NAME=$(basename "$URL")  # مثل: Qwen3-MOE-6x1.7B-10.2B-Shining-Madness-Uncensored.i1-Q4_K_M.gguf
          wget "$URL" -O "$FULL_FILE_NAME"
          echo "FULL_FILE_NAME=$FULL_FILE_NAME" >> $GITHUB_ENV

      - name: پارتیشن‌بندی فایل به قطعات 500 مگابایتی
        run: |
          # با دستور split، فایل رو به قطعات 500 مگابایتی تقسیم کن
          # خروجی: part_aa, part_ab, part_ac, ...
          split -b 500M -d "${{ env.FULL_FILE_NAME }}" "part_"
          
          # تغییر نام قطعات به فرمت دلخواه (part_00.zip, part_01.zip, ...)
          for file in part_*; do
            part_number=${file#part_}
            mv "$file" "part_${part_number}.zip"
          done

      - name: صحت سنجی نهایی (اختیاری اما مفید)
        run: |
          # یک فایل موقت از ترکیب قطعات بساز
          cat part_*.zip > temp_combined.file
          # SHA256 فایل اصلی و فایل موقت رو مقایسه کن
          echo "$(sha256sum ${{ env.FULL_FILE_NAME }} | cut -d ' ' -f1) *temp_combined.file" | sha256sum -c -
          if [ $? -eq 0 ]; then
            echo "✅ صحت‌سنجی موفق: قطعات به درستی ساخته شده‌اند."
          else
            echo "❌ صحت‌سنجی ناموفق: مشکل در قطعات."
            exit 1
          fi
          rm temp_combined.file

      - name: ساخت فایل جمع‌بندی (checksums.txt)
        run: |
          echo "### 🛡️ Checksums for parts" > checksums.txt
          echo "" >> checksums.txt
          echo "\`\`\`" >> checksums.txt
          sha256sum part_*.zip >> checksums.txt
          echo "\`\`\`" >> checksums.txt

      - name: آپلود قطعات به GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Model-Download-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')"
          name: "دانلود مدل - اجرا ${{ github.run_number }}"
          body: |
            سلام! فایل اصلی با موفقیت دانلود و پارتیشن‌بندی شد.

            **فایل اصلی:**
