name: "دانلود و پارتیشن‌بندی تضمینی مدل (نسخه نهایی - بهینه فضا)"

on:
  workflow_dispatch:

jobs:
  prepare_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: بررسی مخزن (Checkout)
        uses: actions/checkout@v4

      - name: نصب ابزارهای مورد نیاز
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: دانلود مدل از Hugging Face
        id: download
        run: |
          URL="https://huggingface.co/CelesteImperia/Gemma-4-26B-MoE-GGUF/resolve/main/Gemma-4-26B-MoE-IQ3_M.gguf"
          FULL_FILE_NAME=$(basename "$URL")
          echo "در حال دانلود: $FULL_FILE_NAME"
          wget --progress=bar:force "$URL" -O "$FULL_FILE_NAME"
          echo "FULL_FILE_NAME=$FULL_FILE_NAME" >> $GITHUB_ENV

      - name: ذخیره SHA256 فایل اصلی (قبل از پارتیشن‌بندی)
        id: hash_original
        run: |
          ORIGINAL_HASH=$(sha256sum "${{ env.FULL_FILE_NAME }}" | cut -d' ' -f1)
          echo "ORIGINAL_HASH=$ORIGINAL_HASH" >> $GITHUB_ENV
          echo "هش فایل اصلی: $ORIGINAL_HASH"

      - name: پارتیشن‌بندی مستقیم فایل (بدون ZIP واسطه)
        run: |
          # تقسیم فایل اصلی به قطعات 500MB
          split -b 500M -d "${{ env.FULL_FILE_NAME }}" "part_"
          # تغییر نام قطعات به فرمت part_00.zip, part_01.zip, ...
          for file in part_*; do
            part_number=${file#part_}
            mv "$file" "part_${part_number}.zip"
          done
          # حذف فایل اصلی برای آزادسازی فضا (مهم)
          rm -f "${{ env.FULL_FILE_NAME }}"
          echo "✅ پارتیشن‌بندی انجام شد و فایل اصلی حذف گردید."

      - name: ایجاد فایل checksums.txt کامل (با هش فایل اصلی)
        run: |
          cat > checksums.txt << EOF
          ### 🔐 Checksums for original file and parts
          # Original file (deleted after splitting)
          ${{ env.ORIGINAL_HASH }}  ${{ env.FULL_FILE_NAME }}

          # SHA256 of each part (part_00.zip ...)
          $(sha256sum part_*.zip)
          EOF
          echo "✅ فایل checksums.txt ایجاد شد."

      - name: (اختیاری) اعتبارسنجی سریع با استفاده از هش ذخیره‌شده
        run: |
          # برای اطمینان بیشتر: یک بار قطعات را موقتاً ترکیب کرده و با هش اصلی مقایسه می‌کنیم
          cat part_*.zip > temp_combined.file
          ACTUAL_HASH=$(sha256sum temp_combined.file | cut -d' ' -f1)
          if [ "$ACTUAL_HASH" = "${{ env.ORIGINAL_HASH }}" ]; then
            echo "✅ اعتبارسنجی موفق: هش قطعات ترکیبی با فایل اصلی مطابقت دارد."
          else
            echo "❌ خطا: هش قطعات ترکیبی با فایل اصلی همخوانی ندارد!"
            exit 1
          fi
          rm temp_combined.file

      - name: انتشار در GitHub با استفاده از GitHub CLI
        id: release
        run: |
          TAG_NAME="model-release-${{ github.run_id }}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          gh release create "$TAG_NAME" \
            --title "📦 مدل پارتیشن‌بندی شده - $TAG_NAME" \
            --notes "فایل اصلی به قطعات 500MB تقسیم شده است.\n\n**هش فایل اصلی:** \`${{ env.ORIGINAL_HASH }}\`\n\n**بازسازی:**\n\`\`\`bash\ncat part_*.zip > ${{ env.FULL_FILE_NAME }}\n\`\`\`\n\n**بررسی صحت:**\n\`\`\`bash\nsha256sum ${{ env.FULL_FILE_NAME }}\n\`\`\`\n(باید با هش بالا یکی باشد)" \
            part_*.zip checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: اعلان موفقیت نهایی
        run: echo "::notice::✅ تمام مراحل با موفقیت انجام شد. Release در آدرس زیر ایجاد گردید: https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG_NAME }}"
