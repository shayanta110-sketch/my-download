name: "Download Offline Resources for Windows 10"

on:
  workflow_dispatch:

jobs:
  download_all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create download directories
        run: |
          mkdir -p ./downloaded-resources/plugins
          mkdir -p ./downloaded-resources/software
          mkdir -p ./downloaded-resources/python-libs
          mkdir -p ./downloaded-resources/tools
          mkdir -p ./downloaded-resources/vscode-extensions

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          sudo apt-get update && sudo apt-get install -y nodejs npm

      - name: Download all resources
        run: |
          # تابع دانلود فایل
          download_file() {
            local url=$1
            local output=$2
            local dir=$3
            for i in 1 2; do
              echo "Downloading: $url -> $dir/$output"
              if wget --header="User-Agent: Mozilla/5.0" --tries=1 --timeout=60 -O "$dir/$output" "$url"; then
                echo "✅ Success: $output"
                return 0
              fi
              sleep 3
            done
            echo "❌ Failed: $output"
            return 1
          }
          
          # 1. افزونه‌های PyCharm
          plugin_dir="./downloaded-resources/plugins"
          download_file "https://github.com/InSyncWithFoo/ryecharm/releases/download/v0.1.0/ryecharm-0.1.0.zip" "ryecharm-0.1.0.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/7973/633650/SonarLint-10.12.1.79155.zip" "SonarLint-10.12.1.79155.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/4509/559380/Statistic-4.2.4.zip" "Statistic-4.2.4.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/10080/548159/RainbowBrackets-6.26.zip" "RainbowBrackets-6.26.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/19178/578667/TabNine-2.6.3.zip" "TabNine-2.6.3.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/21917/636727/Codeium-1.6.5.zip" "Codeium-1.6.5.zip" "$plugin_dir" || true
          download_file "https://github.com/truemanD/IDEA-llm-plugin/releases/download/v1.0.0/IDEA-llm-plugin-1.0.0.zip" "IDEA-llm-plugin-1.0.0.zip" "$plugin_dir" || true
          download_file "https://github.com/devoxx/DevoxxGenieIDEAPlugin/releases/download/v2.1.0/DevoxxGenie-2.1.0.zip" "DevoxxGenie-2.1.0.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/23430/633373/Junie-1.0.0.zip" "Junie-1.0.0.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/28247/624270/Cline-0.1.0.zip" "Cline-0.1.0.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/20063/637408/Cody-1.2.0.zip" "Cody-1.2.0.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/23112/629822/ProxyAI-1.0.1.zip" "ProxyAI-1.0.1.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/15106/612414/DiffblueCover-1.12.0.zip" "DiffblueCover-1.12.0.zip" "$plugin_dir" || true
          download_file "https://plugins.jetbrains.com/files/21476/625690/GitCommitMessageHelper-1.2.0.zip" "GitCommitMessageHelper-1.2.0.zip" "$plugin_dir" || true
          
          # 2. نرم‌افزارهای ویندوز
          sw_dir="./downloaded-resources/software"
          download_file "https://github.com/agentforce314/clawcodex/releases/download/v1.0.0/ClawCodex-Setup-1.0.0.exe" "ClawCodex-Setup-1.0.0.exe" "$sw_dir" || true
          download_file "https://github.com/yusufcanb/tlm/releases/download/v0.12.0/tlm_0.12.0_Windows_x86_64.zip" "tlm_0.12.0_Windows_x86_64.zip" "$sw_dir" || true
          
          # 3. کتابخانه‌های پایتون (مخصوص ویندوز 64-bit)
          py_dir="./downloaded-resources/python-libs"
          pip download -d "$py_dir" --platform win_amd64 --python-version 3.13 --only-binary :all: healing-agent codevet little-coder vicode || echo "Failed" >> "$py_dir/FAILED.txt"
          
          # 4. ابزارها (FastEdit برای ویندوز)
          tools_dir="./downloaded-resources/tools"
          pip download -d "$tools_dir" --platform win_amd64 --python-version 3.13 --only-binary :all: pyfastedit || echo "Failed" >> "$tools_dir/FAILED.txt"
          cd "$tools_dir"
          npm pack codebuff || true
          cd ../..
          
          # 5. افزونه‌های VS Code
          vscode_dir="./downloaded-resources/vscode-extensions"
          pip install offvsix
          cat > extensions.txt << EOF
          ms-python.python
          ms-python.vscode-pylance
          ms-toolsai.jupyter
          ms-python.debugpy
          ms-python.black-formatter
          EOF
          offvsix --file extensions.txt --destination "$vscode_dir" || true

      - name: Create ZIP archive (part01.zip)
        run: |
          rm -f part01.zip
          zip -r part01.zip ./downloaded-resources/
          echo "✅ part01.zip created"
          ls -lh part01.zip

      - name: Create Git tag
        id: tag
        run: |
          TAG_NAME="offline-resources-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Offline Resources for Windows"
          git push origin "$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and upload asset with GitHub CLI
        run: |
          # ایجاد ریلیز با gh
          gh release create ${{ steps.tag.outputs.TAG_NAME }} \
            --title "دانلود منابع آفلاین ویندوز - شماره ${{ github.run_number }}" \
            --notes "فایل zip شامل افزونه‌ها، نرم‌افزارها، کتابخانه‌های پایتون (ویندوز)، ابزارها و افزونه‌های VS Code. برای استخراج: unzip part01.zip"
          # آپلود فایل part01.zip
          gh release upload ${{ steps.tag.outputs.TAG_NAME }} part01.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
