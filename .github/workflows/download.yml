name: دانلود مدل ترجمه انگلیسی به فارسی

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install huggingface_hub
      - run: hf download Helsinki-NLP/opus-mt-en-fa --local-dir ./model
      - uses: actions/upload-artifact@v4
        with:
          name: opus-mt-en-fa
          path: ./model
