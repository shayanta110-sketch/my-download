name: تست با مدل کوچک (روش جدید)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install huggingface_hub
      - run: hf download bert-base-uncased --local-dir ./model
      - uses: actions/upload-artifact@v4
        with:
          name: bert-model
          path: ./model
