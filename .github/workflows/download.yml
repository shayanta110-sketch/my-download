name: دانلود با آینه

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: تنظیم آینه
        run: echo "HF_ENDPOINT=https://hf-mirror.com" >> $GITHUB_ENV
      - run: pip install huggingface_hub
      - run: huggingface-cli download Helsinki-NLP/opus-mt-en-fa --local-dir ./model
      - uses: actions/upload-artifact@v4
        with:
          name: opus-mt-en-fa
          path: ./model
