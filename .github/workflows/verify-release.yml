name: اعتبارسنجی قطعات چندقسمتی (روش split + SHA256)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'آدرس مخزن (مثال: shayanta110-sketch/my-download)'
        required: true
        default: 'shayanta110-sketch/my-download'
      release_tag:
        description: 'نام Tag (مثال: model-release-25008447063-19)'
        required: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت اطلاعات Release از API
        id: get_assets
        run: |
          REPO="${{ github.event.inputs.repository }}"
          TAG="${{ github.event.inputs.release_tag }}"
          API_URL="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"
          echo "در حال دریافت اطلاعات از: $API_URL"
          RESPONSE=$(curl -s "$API_URL")
          if echo "$RESPONSE" | grep -q "Not Found"; then
            echo "❌ Release با Tag '$TAG' در مخزن '$REPO' یافت نشد"
            exit 1
          fi
          ASSETS=$(echo "$RESPONSE" | jq -r '.assets[].browser_download_url')
          if [ -z "$ASSETS" ]; then
            echo "❌ هیچ فایلی در این Release وجود ندارد"
            exit 1
          fi
          echo "$ASSETS" > urls.txt
          echo "✅ تعداد فایل‌های موجود: $(cat urls.txt | wc -l)"

      - name: دانلود تمام فایل‌ها
        run: |
          mkdir -p download_parts
          cd download_parts
          while read url; do
            filename=$(basename "$url")
            echo "در حال دانلود: $filename"
            curl -L -O --progress-bar "$url"
          done < ../urls.txt
          cd ..

      - name: جستجوی فایل checksums.txt
        id: find_checksum
        run: |
          if [ -f "download_parts/checksums.txt" ]; then
            echo "✅ فایل checksums.txt موجود است"
            echo "CHECKSUM_EXISTS=true" >> $GITHUB_ENV
            cp download_parts/checksums.txt .
          else
            echo "⚠️ فایل checksums.txt در Release وجود ندارد"
            echo "CHECKSUM_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: ترکیب قطعات (cat part_*.zip)
        run: |
          cd download_parts
          ls part_*.zip 2>/dev/null | sort -V | xargs cat > combined_file
          if [ ! -f combined_file ]; then
            echo "❌ ترکیب قطعات ناموفق"
            exit 1
          fi
          ACTUAL_SHA=$(sha256sum combined_file | cut -d' ' -f1)
          echo "ACTUAL_SHA=$ACTUAL_SHA" >> $GITHUB_ENV
          mv combined_file ../
          cd ..

      - name: اعتبارسنجی با استفاده از checksums.txt (فرمت استاندارد)
        if: env.CHECKSUM_EXISTS == 'true'
        run: |
          # روش اول: استفاده از دستور استاندارد sha256sum -c
          # این دستور خطوط کامنت شده (#) را نادیده می‌گیرد
          if sha256sum -c checksums.txt --ignore-missing 2>/dev/null; then
            echo "✅ همه هش‌های موجود در checksums.txt تأیید شدند."
          else
            echo "⚠️ برخی هش‌ها در checksums.txt مطابقت ندارند یا فرمت مشکل دارد."
          fi

          # استخراج هش فایل اصلی (برای گزارش دقیق)
          ORIGINAL_SHA=$(grep -v "^#" checksums.txt | grep "${{ env.FULL_FILE_NAME }}" | head -1 | awk '{print $1}')
          if [ -z "$ORIGINAL_SHA" ]; then
            # اگر فایل اصلی در checksums.txt نبود (مثلاً فقط هش قطعات باشد)
            # سعی می‌کنیم اولین هش غیر از part_ را پیدا کنیم
            ORIGINAL_SHA=$(grep -v "^#" checksums.txt | grep -v "part_" | grep -E '^[a-f0-9]{64}' | head -1 | awk '{print $1}')
          fi

          if [ -n "$ORIGINAL_SHA" ]; then
            echo "هش مورد انتظار (از checksums.txt): $ORIGINAL_SHA"
            echo "هش محاسبه شده (از ترکیب قطعات): $ACTUAL_SHA"
            if [ "$ACTUAL_SHA" = "$ORIGINAL_SHA" ]; then
              echo "✅ اعتبارسنجی کامل: فایل اصلی سالم است و با هش موجود در checksums.txt مطابقت دارد."
            else
              echo "❌ خطا: SHA256 مطابقت ندارد. فایل اصلی خراب است."
              exit 1
            fi
          else
            echo "⚠️ هش فایل اصلی در checksums.txt یافت نشد، اما هش قطعات بررسی شد."
          fi

      - name: اعتبارسنجی در صورت نبود checksums.txt (با استفاده از API)
        if: env.CHECKSUM_EXISTS == 'false'
        run: |
          echo "⚠️ فایل checksums.txt موجود نیست. در حال تلاش برای دریافت هش از GitHub API..."
          REPO="${{ github.event.inputs.repository }}"
          TAG="${{ github.event.inputs.release_tag }}"
          API_URL="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"
          DIGEST=$(curl -s "$API_URL" | jq -r '.assets[] | select(.name | test("part_00|combined")) | .digest' | head -1)
          if [ -n "$DIGEST" ] && [ "$DIGEST" != "null" ]; then
            EXPECTED_SHA=$(echo "$DIGEST" | sed 's/^sha256://')
            if [ "$ACTUAL_SHA" = "$EXPECTED_SHA" ]; then
              echo "✅ اعتبارسنجی موفق: هش فایل ترکیبی با digest گیت‌هاب مطابقت دارد."
            else
              echo "❌ خطا: هش با digest گیت‌هاب مطابقت ندارد."
              exit 1
            fi
          else
            echo "✅ هش فایل ترکیبی (بدون مرجع) محاسبه شد: $ACTUAL_SHA"
            echo "::notice::توجه: بدون checksums.txt یا digest، فقط فرآیند ترکیب تأیید شد."
          fi

      - name: پاکسازی فایل‌های موقتی
        run: rm -rf download_parts combined_file checksums.txt urls.txt

      - name: گزارش موفقیت نهایی
        if: success()
        run: echo "::notice::✅ اعتبارسنجی با موفقیت به پایان رسید. فایل اصلی قابل بازسازی است."
