name: اعتبارسنجی قطعات چندقسمتی (روش split + SHA256)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'نام Tag (مثال: apks-v2.0)'
        required: true
        default: 'apks-v2.0'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت لیست فایل‌ها از API
        id: get_assets
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          ASSETS=$(curl -s "$API_URL" | jq -r '.assets[].browser_download_url')
          if [ -z "$ASSETS" ]; then
            echo "❌ هیچ فایلی یافت نشد"
            exit 1
          fi
          echo "$ASSETS" > urls.txt
          echo "✅ $(cat urls.txt | wc -l) فایل پیدا شد"

      - name: دانلود فایل‌ها
        run: |
          mkdir parts && cd parts
          while read url; do
            filename=$(basename "$url")
            echo "دانلود $filename ..."
            curl -L -O "$url"
          done < ../urls.txt

      - name: ترکیب قطعات با cat
        run: |
          cd parts
          # مرتب‌سازی عددی (part_00.zip, part_01.zip, ...)
          ls part_*.zip 2>/dev/null | sort -V | xargs cat > combined.file
          if [ ! -f combined.file ]; then
            echo "❌ ترکیب ناموفق"
            exit 1
          fi
          echo "✅ combined.file ساخته شد (حجم: $(stat -c%s combined.file) بایت)"
          # محاسبه SHA256 فایل ترکیبی
          ACTUAL_SHA=$(sha256sum combined.file | cut -d' ' -f1)
          echo "ACTUAL_SHA=$ACTUAL_SHA" >> $GITHUB_ENV
          mv combined.file ../

      - name: جستجوی فایل checksums.txt در Assets
        run: |
          if grep -q "checksums.txt" urls.txt; then
            echo "CHECKSUMS_EXISTS=true" >> $GITHUB_ENV
            # دانلود فایل checksums.txt
            CHECKSUM_URL=$(grep "checksums.txt" urls.txt | head -1)
            curl -L -o checksums.txt "$CHECKSUM_URL"
          else
            echo "CHECKSUMS_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: مقایسه SHA256 با مقدار مرجع
        if: env.CHECKSUMS_EXISTS == 'true'
        run: |
          # استخراج SHA256 فایل اصلی از checksums.txt (فرض: فایل اصلی نامش در آن هست)
          ORIGINAL_SHA=$(grep -E "combined.file|original" checksums.txt | head -1 | cut -d' ' -f1)
          if [ -z "$ORIGINAL_SHA" ]; then
            echo "⚠️ مقدار مرجع برای فایل اصلی در checksums.txt یافت نشد"
          else
            if [ "$ACTUAL_SHA" = "$ORIGINAL_SHA" ]; then
              echo "✅ اعتبارسنجی کامل: فایل اصلی سالم است."
            else
              echo "❌ خطا: SHA256 مطابقت ندارد. فایل خراب است."
              echo "   مقدار مورد انتظار: $ORIGINAL_SHA"
              echo "   مقدار محاسبه شده: $ACTUAL_SHA"
              exit 1
            fi
          fi

      - name: گزارش در صورت نبود checksums.txt
        if: env.CHECKSUMS_EXISTS == 'false'
        run: |
          echo "::warning::⚠️ فایل checksums.txt در Release وجود ندارد. فقط ترکیب قطعات بررسی شد، اما صحت محتوا تأیید نشد."
          echo "✅ قطعات با موفقیت دانلود و ترکیب شدند. فایل combined.file در این اجرا ساخته شد."

      - name: پاکسازی فایل‌های موقتی
        run: rm -rf parts combined.file checksums.txt

      - name: گزارش موفقیت نهایی
        if: success()
        run: echo "::notice::✅ فرآیند اعتبارسنجی با موفقیت به پایان رسید."
