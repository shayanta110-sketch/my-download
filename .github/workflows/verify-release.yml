name: اعتبارسنجی ZIP چندقسمتی (بدون نیاز به چک‌سام)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'نام Tag (مثال: apks-v2.0)'
        required: true
        default: 'apks-v2.0'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت لیست فایل‌ها از API
        id: get_assets
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          ASSETS=$(curl -s "$API_URL" | jq -r '.assets[].browser_download_url')
          if [ -z "$ASSETS" ]; then
            echo "❌ هیچ فایلی یافت نشد"
            exit 1
          fi
          echo "$ASSETS" > urls.txt
          echo "✅ $(cat urls.txt | wc -l) فایل پیدا شد"

      - name: دانلود فایل‌ها
        run: |
          mkdir parts && cd parts
          while read url; do
            filename=$(basename "$url")
            echo "دانلود $filename ..."
            curl -L -O "$url"
          done < ../urls.txt

      - name: ترکیب فایل‌های part
        run: |
          cd parts
          # مرتب‌سازی بر اساس نام عددی (part1, part2, part10)
          ls part*.zip 2>/dev/null | sort -V | xargs cat > combined.zip
          if [ ! -f combined.zip ]; then
            echo "❌ ترکیب ناموفق"
            exit 1
          fi
          echo "✅ combined.zip ساخته شد"

      - name: تست یکپارچگی فایل ZIP نهایی
        run: |
          cd parts
          if unzip -tq combined.zip > /dev/null 2>&1; then
            echo "✅ تست یکپارچگی PASSED"
          else
            echo "❌ تست یکپارچگی FAILED - فایل ZIP خراب است"
            exit 1
          fi

      - name: پاکسازی فایل‌های موقتی
        run: rm -rf parts

      - name: گزارش موفقیت
        run: echo "::notice::✅ همه فایل‌ها سالم هستند و ZIP به درستی ترکیب می‌شود"
