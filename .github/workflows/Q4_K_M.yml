jobs:
  quantize:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup llama.cpp
      run: |
        sudo apt update && sudo apt install -y build-essential cmake
        git clone https://github.com/ggerganov/llama.cpp
        cd llama.cpp
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j4

    - name: Download model
      run: |
        wget "https://huggingface.co/chewjh/cs4262-qwen-sft-n8n-GGUF/resolve/main/cs4262-qwen-sft-n8n-f16.gguf?download=true" -O original.gguf

    - name: Quantize model
      run: |
        cd llama.cpp/build/bin
        ./llama-quantize ../../../../original.gguf ../../../../quantized.gguf Q4_K_M

    - name: Checksum
      run: |
        sha256sum quantized.gguf > checksums.txt

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          quantized.gguf
          checksums.txt
