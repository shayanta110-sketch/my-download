name: "دانلود دسته‌ای مدل‌ها و پارتیشن‌بندی (نسخه نهایی - اصلاح شده)"

on:
  workflow_dispatch:

jobs:
  prepare_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: بررسی مخزن (Checkout)
        uses: actions/checkout@v4

      - name: نصب ابزارهای مورد نیاز
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: ایجاد پوشه برای دانلود فایل‌ها
        run: mkdir -p ./downloaded_models

      - name: دانلود تمام فایل‌ها با تأخیر بین هر دانلود (تعریف تابع در همان مرحله)
        run: |
          # تعریف تابع دانلود با دو بار تلاش
          download_file() {
            local url=$1
            local output=$2
            local dir="./downloaded_models"
            for i in 1 2; do
              echo "Downloading: $url -> $dir/$output"
              if wget --progress=bar:force --tries=1 --timeout=60 -O "$dir/$output" "$url"; then
                echo "✅ Success: $output"
                return 0
              fi
              sleep 3
            done
            echo "❌ Failed: $output"
            return 1
          }
          
          # فراخوانی دانلود برای هر لینک با فاصله ۲ ثانیه
          download_file "https://huggingface.co/mah92/Khadijah-FA_EN-Matcha-TTS-Model/resolve/main/matcha-fa_en-khadijah-22050-3.onnx" "matcha-fa_en-khadijah-22050-3.onnx"
          sleep 2
          
          download_file "https://huggingface.co/mah92/Khadijah-FA_EN-Matcha-TTS-Model/resolve/main/add_sherpa_metadata_to_matcha.py" "add_sherpa_metadata_to_matcha.py"
          sleep 2
          
          download_file "https://huggingface.co/MahtaFetrat/Mana-Persian-Piper/resolve/main/fa_IR-mana-medium.onnx" "fa_IR-mana-medium.onnx"
          sleep 2
          
          download_file "https://huggingface.co/MahtaFetrat/Mana-Persian-Piper/resolve/main/fa_IR-mana-medium.onnx.json" "fa_IR-mana-medium.onnx.json"
          sleep 2
          
          download_file "https://huggingface.co/csukuangfj/sherpa-onnx-libs/resolve/main/win64/sherpa-onnx-v1.9.12-win-x64-shared.tar.bz2" "sherpa-onnx-v1.9.12-win-x64-shared.tar.bz2"
          sleep 2
          
          download_file "https://huggingface.co/PaddlePaddle/PaddleOCR-VL-1.5-GGUF/resolve/main/PaddleOCR-VL-1.5.gguf" "PaddleOCR-VL-1.5.gguf"
          sleep 2
          
          download_file "https://huggingface.co/nold/starcoder2-3b-GGUF/resolve/1ae8f93b9169bb114e9968777ba16f77809c5169/starcoder2-3b_Q8_0.gguf" "starcoder2-3b_Q8_0.gguf"
          sleep 2
          
          download_file "https://huggingface.co/allenai/OLMo-2-0425-1B-GGUF/resolve/main/OLMo-2-0425-1B-Q6_K.gguf" "OLMo-2-0425-1B-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/afrideva/bling-sheared-llama-1.3b-0.1-GGUF/resolve/main/bling-sheared-llama-1.3b-0.1.q6_k.gguf" "bling-sheared-llama-1.3b-0.1.q6_k.gguf"
          sleep 2
          
          download_file "https://huggingface.co/bartowski/Menlo_Lucy-GGUF/resolve/main/Menlo_Lucy-Q6_K_L.gguf" "Menlo_Lucy-Q6_K_L.gguf"
          sleep 2
          
          download_file "https://huggingface.co/LiquidAI/LFM2-1.2B-GGUF/resolve/main/LFM2-1.2B-Q6_K.gguf" "LFM2-1.2B-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/llmware/slim-summary-tiny-tool/resolve/a912c1e94791835898b12ebb05af51f7e5a2ea0b/tiny-summary.gguf" "tiny-summary.gguf"
          sleep 2
          
          download_file "https://huggingface.co/bartowski/LiquidAI_LFM2-1.2B-Tool-GGUF/resolve/main/LiquidAI_LFM2-1.2B-Tool-Q6_K.gguf" "LiquidAI_LFM2-1.2B-Tool-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/bartowski/LiquidAI_LFM2-1.2B-Extract-GGUF/resolve/main/LiquidAI_LFM2-1.2B-Extract-Q6_K.gguf" "LiquidAI_LFM2-1.2B-Extract-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/bartowski/LiquidAI_LFM2-350M-Math-GGUF/resolve/main/LiquidAI_LFM2-350M-Math-Q6_K.gguf" "LiquidAI_LFM2-350M-Math-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/bartowski/stable-code-instruct-3b-GGUF/resolve/main/stable-code-instruct-3b-Q6_K.gguf" "stable-code-instruct-3b-Q6_K.gguf"
          sleep 2
          
          download_file "https://huggingface.co/afrideva/tinyllama-python-GGUF/resolve/main/tinyllama-python.q6_k.gguf" "tinyllama-python.q6_k.gguf"

      # ادامه مراحل قبلی: ایجاد ZIP، پارتیشن‌بندی، checksums.txt، انتشار
      - name: ایجاد بایگانی ZIP بدون فشرده‌سازی از تمام فایل‌های دانلودی
        id: archive
        run: |
          cd downloaded_models
          zip -0 -r ../all_models.zip .
          cd ..
          ORIGINAL_HASH=$(sha256sum all_models.zip | cut -d' ' -f1)
          echo "ORIGINAL_HASH=$ORIGINAL_HASH" >> $GITHUB_ENV
          echo "هش فایل ZIP اصلی: $ORIGINAL_HASH"

      - name: پارتیشن‌بندی در صورت نیاز (بزرگتر از 500MB)
        run: |
          FILE_SIZE=$(stat -c%s "all_models.zip")
          MAX_SIZE=$((500 * 1024 * 1024))
          if [ $FILE_SIZE -gt $MAX_SIZE ]; then
            echo "حجم فایل ZIP اصلی ($FILE_SIZE بایت) بیشتر از 500MB است. پارتیشن‌بندی می‌شود..."
            split -b 500M --numeric-suffixes=1 -a 2 "all_models.zip" "part_"
            for file in part_*; do
              mv "$file" "${file}.zip"
            done
            rm all_models.zip
            echo "PARTITIONED=true" >> $GITHUB_ENV
          else
            echo "حجم فایل ZIP اصلی کمتر از 500MB است. بدون پارتیشن آپلود می‌شود."
            mv all_models.zip part_01.zip
            echo "PARTITIONED=false" >> $GITHUB_ENV
          fi

      - name: ایجاد فایل checksums.txt استاندارد (برای sha256sum -c)
        run: |
          echo "# Checksums for all_models.zip and its parts" > checksums.txt
          echo "# Original file hash: ${{ env.ORIGINAL_HASH }}" >> checksums.txt
          echo "" >> checksums.txt
          sha256sum part_*.zip >> checksums.txt
          cat checksums.txt

      - name: (اختیاری) اعتبارسنجی سریع در صورت پارتیشن‌بندی
        if: env.PARTITIONED == 'true'
        run: |
          cat part_*.zip > temp_combined.zip
          ACTUAL_HASH=$(sha256sum temp_combined.zip | cut -d' ' -f1)
          if [ "$ACTUAL_HASH" = "${{ env.ORIGINAL_HASH }}" ]; then
            echo "✅ اعتبارسنجی موفق: قطعات به درستی ترکیب می‌شوند."
          else
            echo "❌ خطا: هش قطعات ترکیبی با فایل اصلی همخوانی ندارد!"
            exit 1
          fi
          rm temp_combined.zip

      - name: آماده‌سازی متن رلیز (Release Notes)
        run: |
          cat > release_notes.md << EOF
          ## 📦 مجموعه مدل‌ها و فایل‌های دانلودی

          این بسته شامل مدل‌های TTS، OCR، LLM و ابزارهای مرتبط است.

          **هش SHA256 فایل ZIP اصلی:**
          \`\`\`
          ${{ env.ORIGINAL_HASH }}
          \`\`\`

          ### نحوه بازسازی:
          1. همه فایل‌های \`part_*.zip\` را دانلود کنید.
          2. دستور زیر را اجرا کنید:
             \`\`\`bash
             cat part_*.zip > all_models.zip
             unzip all_models.zip -d extracted
             \`\`\`
          3. پوشه \`extracted\` شامل همه فایل‌ها است.

          ### بررسی صحت:
          \`sha256sum -c checksums.txt\`
          EOF

      - name: انتشار در GitHub با استفاده از GitHub CLI
        id: release
        run: |
          TAG_NAME="models-bundle-${{ github.run_id }}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          gh release create "$TAG_NAME" \
            --title "بسته مدل‌های دانلودی - $TAG_NAME" \
            --notes-file release_notes.md \
            part_*.zip checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: اعلان موفقیت نهایی
        run: echo "::notice::✅ تمام مراحل با موفقیت انجام شد. Release در آدرس https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG_NAME }} ایجاد گردید."
